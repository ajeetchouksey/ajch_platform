name: Sync Analytics Stats
# Fetches GA4 user metrics every 30 minutes and writes to the public Gist.
# The browser reads live analytics directly from the Gist at runtime —
# no repo commit or Pages redeploy required.
# Requires GitHub secrets: GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_KEY, GIST_TOKEN.
# GIST_TOKEN = classic PAT with 'gist' scope (gist-sync-pat).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger for testing

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GA4 client deps
        run: pip install --quiet google-auth google-auth-httplib2 requests

      - name: Fetch GA4 metrics and write to gist
        env:
          GA4_PROPERTY_ID:         ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GIST_TOKEN:              ${{ secrets.GIST_TOKEN }}
          PUBLIC_STATS_GIST_ID:    4ccf1b49e144256342d92bab727fbb89
        run: python3 .github/scripts/fetch-ga4.py
