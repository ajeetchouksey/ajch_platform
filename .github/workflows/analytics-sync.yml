name: Sync Analytics Stats
# Fetches GA4 user metrics every 30 minutes, writes to public stats gist,
# AND commits updated stats.json back to main so the site always shows live data.
# Requires GitHub secrets: GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_KEY, GIST_TOKEN.
# GIST_TOKEN = classic PAT with 'gist' scope (gist-sync-pat).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger for testing

permissions:
  contents: write   # needed to commit stats.json back to main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GA4 client deps
        run: pip install --quiet google-auth google-auth-httplib2 requests

      - name: Fetch GA4 metrics and write to gist + stats.json
        env:
          GA4_PROPERTY_ID:         ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GIST_TOKEN:              ${{ secrets.GIST_TOKEN }}
          PUBLIC_STATS_GIST_ID:    4ccf1b49e144256342d92bab727fbb89
        run: python3 .github/scripts/fetch-ga4.py

      - name: Commit updated stats.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/stats.json
          if git diff --cached --quiet; then
            echo "stats.json unchanged — nothing to commit."
          else
            git commit -m "chore(analytics): sync stats.json from GA4 [skip ci]"
            git push origin main
          fi
