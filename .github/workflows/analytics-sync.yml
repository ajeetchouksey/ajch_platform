name: Sync Analytics Stats
# Fetches GA4 user metrics every 2 hours and commits updated stats.json.
# Requires GitHub secrets: GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_KEY, GH_APP_ID, GH_APP_PRIVATE_KEY.
# Uses GitHub App token (aarya-platform-bot) to bypass branch protection on direct push.

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:         # manual trigger for testing

permissions:
  contents: write            # needed to commit stats.json

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e  # v1.11.7
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GA4 client deps
        run: pip install --quiet google-auth google-auth-httplib2 requests

      - name: Fetch GA4 metrics
        env:
          GA4_PROPERTY_ID:         ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: python3 .github/scripts/fetch-ga4.py

      - name: Commit updated stats.json
        run: |
          git config user.name  "aarya-platform-bot[bot]"
          git config user.email "aarya-platform-bot[bot]@users.noreply.github.com"
          git add public/content/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync analytics stats [skip ci]"
            git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/ajeetchouksey/ajch_platform.git HEAD:main
          else
            echo "No changes to commit."
          fi
