name: Sync Analytics Stats
# Fetches GA4 user metrics every 3 hours and commits updated stats.json.
# Requires GitHub secrets: GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_KEY, STATS_PAT.
# STATS_PAT = classic PAT (public_repo scope) from ajeetchouksey — repo admin bypass.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual trigger for testing

permissions:
  contents: write            # needed to commit stats.json

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STATS_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GA4 client deps
        run: pip install --quiet google-auth google-auth-httplib2 requests

      - name: Fetch GA4 metrics
        env:
          GA4_PROPERTY_ID:         ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: python3 .github/scripts/fetch-ga4.py

      - name: Commit updated stats.json
        run: |
          git config user.name  "ajeetchouksey"
          git config user.email "ajeetchouksey@users.noreply.github.com"
          git add public/content/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync analytics stats [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
