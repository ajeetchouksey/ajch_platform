name: GitHub Release
# Owned by DevOps Agent. Triggered automatically on every vX.Y.Z tag push.
# Creates a properly structured GitHub Release with:
#   - Release header (date · tag · commit SHA)
#   - Changelog section extracted from .github/CHANGELOG.md
#   - Commit log since previous stable tag
#   - Agent registry snapshot (name + version of every .agent.md file)
#   - Build artifact: aarya-{version}.tar.gz + SHA256 checksum
# Pre-release tags (v*-alpha.*, v*-beta.*, v*-rc.*) are marked as pre-release
# and never set as "latest". Stable releases always become "latest".

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # stable:     v2.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # pre-release: v2.1.0-beta.1, v2.1.0-rc.1

permissions:
  contents: write   # create GitHub Releases, push registry.json commit
  actions:  write   # trigger deploy.yml workflow dispatch

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false          # never cancel a release in flight

    steps:
      # ── 1. Checkout full history so tags and log are fully resolved ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Parse tag → version, date, short SHA, pre-release flag ─────────
      - name: Parse tag metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%d")
          SHA="${GITHUB_SHA:0:8}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE"       >> $GITHUB_OUTPUT
          echo "sha=$SHA"         >> $GITHUB_OUTPUT
          if echo "$TAG" | grep -qE -- '-(alpha|beta|rc)'; then
            echo "prerelease=true"  >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Guard — skip everything if this release already exists ─────────
      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Release ${{ steps.meta.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ── 4. Set up Node.js and build the app ───────────────────────────────
      - name: Set up Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm ci && npm run build
        env:
          HUSKY: '0'
          VITE_REPO_BASE: /

      - name: Package dist artifact
        if: steps.check.outputs.exists == 'false'
        run: |
          ARTIFACT="aarya-${{ steps.meta.outputs.version }}.tar.gz"
          tar -czf "$ARTIFACT" dist/
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"
          echo "artifact=$ARTIFACT" >> $GITHUB_ENV

      # ── 5. Write release notes header ─────────────────────────────────────
      - name: Write release notes header
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          DATE="${{ steps.meta.outputs.date }}"
          SHA="${{ steps.meta.outputs.sha }}"
          printf '> 📅 Released: %s  ·  🔖 Tag: `%s`  ·  🔨 Commit: `%s`\n\n' \
            "$DATE" "$TAG" "$SHA" > /tmp/release_body.md

      # ── 6. Extract the matching CHANGELOG section via Python ──────────────
      - name: Extract CHANGELOG section
        if: steps.check.outputs.exists == 'false'
        run: |
          python3 scripts/extract_changelog.py \
            "${{ steps.meta.outputs.version }}" \
            .github/CHANGELOG.md \
            >> /tmp/release_body.md

      # ── 7. Append commit log since previous stable tag ────────────────────
      - name: Append commit log
        if: steps.check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            printf '\n---\n\n## 📦 Commits since `%s`\n\n```\n' "$PREV_TAG" \
              >> /tmp/release_body.md
            git log --oneline "${PREV_TAG}..${{ steps.meta.outputs.tag }}" \
              >> /tmp/release_body.md
            printf '```\n' >> /tmp/release_body.md
          fi

      # ── 8. Append agent registry snapshot ────────────────────────────────
      - name: Append agent registry snapshot
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          printf '\n---\n\n## \U0001f916 Agent Registry\n' >> /tmp/release_body.md
          printf '\n| Agent | Version | File |\n' >> /tmp/release_body.md
          printf '|-------|---------|------|\n'   >> /tmp/release_body.md

          for f in $(ls .github/agents/*.agent.md 2>/dev/null | sort); do
            name=$(grep '^name:'    "$f" | head -1 | sed 's/^name:[[:space:]]*//'    | tr -d '"')
            ver=$( grep '^version:' "$f" | head -1 | sed 's/^version:[[:space:]]*//' | tr -d '"')
            base=$(basename "$f")
            if [ -n "$name" ] && [ -n "$ver" ]; then
              printf '| %s | `%s` | `%s` |\n' "$name" "$ver" "$base" \
                >> /tmp/release_body.md
            fi
          done

          printf '\n> Snapshot taken at tag **%s**\n' "$TAG" >> /tmp/release_body.md

      # ── 9. Freeze registry.json with release platform version ────────────
      # Only runs for stable releases (not pre-releases). Creates a PR for the
      # updated registry.json — branch protection prevents direct push to main.
      - name: Freeze registry.json at release version
        if: steps.check.outputs.exists == 'false' && steps.meta.outputs.prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/freeze_registry.py \
            "${{ steps.meta.outputs.date }}" \
            "${{ steps.meta.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/agents/registry.json
          if git diff --staged --quiet; then
            echo "Registry unchanged — no commit needed."
          else
            BRANCH="chore/freeze-registry-v${{ steps.meta.outputs.version }}"
            git checkout -b "$BRANCH"
            git commit -m "chore(release): freeze registry.json at v${{ steps.meta.outputs.version }} [skip ci]"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --title "chore(release): freeze registry.json at v${{ steps.meta.outputs.version }}" \
              --body "Auto-generated by release workflow for tag \`${{ steps.meta.outputs.tag }}\`. Registry snapshot frozen at release version." \
              --base main \
              --head "$BRANCH")
            echo "Registry PR created: $PR_URL"
            gh pr merge "$BRANCH" --squash --auto || echo "Auto-merge not available — PR requires manual merge."
          fi

      # ── 10. Create the GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          ARTIFACT="aarya-${{ steps.meta.outputs.version }}.tar.gz"

          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$TAG" \
              --title "Aarya — My AI Learning Hub $TAG" \
              --notes-file /tmp/release_body.md \
              --prerelease \
              --no-latest \
              "$ARTIFACT" "${ARTIFACT}.sha256"
          else
            gh release create "$TAG" \
              --title "Aarya — My AI Learning Hub $TAG" \
              --notes-file /tmp/release_body.md \
              --latest \
              "$ARTIFACT" "${ARTIFACT}.sha256"
          fi

      # ── 11. Trigger deployment workflow (stable releases only) ────────────
      # Dispatches deploy.yml on the main branch so deployment is explicitly
      # tracked as a child run in the Actions UI.
      # Pre-releases are excluded — they never auto-deploy to production.
      - name: Trigger deployment workflow
        id: dispatch
        if: steps.check.outputs.exists == 'false' && steps.meta.outputs.prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref main
          echo "triggered=true" >> $GITHUB_OUTPUT

      # ── 12. Write job summary ────────────────────────────────────────────
      - name: Write job summary
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          DATE="${{ steps.meta.outputs.date }}"
          SHA="${{ steps.meta.outputs.sha }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ARTIFACT="aarya-${VERSION}.tar.gz"

          # Get canonical release URL from gh API
          RELEASE_URL=$(gh release view "$TAG" --json url -q '.url' 2>/dev/null || echo "")

          # Artifact size (human-readable)
          ARTIFACT_SIZE=$([ -f "$ARTIFACT" ] && du -sh "$ARTIFACT" | cut -f1 || echo "—")

          # Count agent files
          AGENT_COUNT=$(ls .github/agents/*.agent.md 2>/dev/null | wc -l | tr -d ' ')

          # Deployment status label
          if [ "$PRERELEASE" = "false" ]; then
            DEPLOY_STATUS="✅ Dispatched \`deploy.yml\` on \`main\`"
          else
            DEPLOY_STATUS="⏭️ Skipped — pre-release tag"
          fi

          # Release status label
          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_STATUS="⚠️ Pre-release (not latest)"
          else
            RELEASE_STATUS="✅ Stable · marked **latest**"
          fi

          {
            echo "## 🚀 Release \`$TAG\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Status**     | $RELEASE_STATUS |"
            echo "| **Date**       | $DATE |"
            echo "| **Commit**     | \`$SHA\` |"
            echo "| **Release**    | $RELEASE_URL |"
            echo "| **Artifact**   | \`$ARTIFACT\` (${ARTIFACT_SIZE}) |"
            echo "| **Agents**     | ${AGENT_COUNT} registered |"
            echo "| **Deployment** | $DEPLOY_STATUS |"
            echo ""
            echo "---"
            echo ""
            cat /tmp/release_body.md
          } >> $GITHUB_STEP_SUMMARY
