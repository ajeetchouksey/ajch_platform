name: Deploy to GitHub Pages
# v3 — raw git push to gh-pages (avoids broken actions/pages-* CDN)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_REPO_BASE: /${{ github.event.repository.name }}/
          VITE_GOAT_TOKEN: ${{ secrets.VITE_GOAT_TOKEN }}
          VITE_GOAT_SITE: ${{ secrets.VITE_GOAT_SITE }}
          VITE_GH_CLIENT_ID: ${{ secrets.VITE_GH_CLIENT_ID }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
