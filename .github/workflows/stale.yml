name: Stale Issues and PRs
# Auto-labels issues/PRs with no activity as stale, then closes them after a grace period.
# Exempt: items with keep-open/pinned/security labels, or linked to an active milestone.

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Timing ───────────────────────────────────────────────────────
          days-before-stale: 60
          days-before-close: 14

          # ── Labels ───────────────────────────────────────────────────────
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

          # ── Messages ─────────────────────────────────────────────────────
          stale-issue-message: |
            This issue has had no activity for **60 days**. It will be automatically closed in **14 days** unless there is new activity or it is labelled `keep-open`.

            If this is still relevant, please leave a comment or re-open after closing.
          stale-pr-message: |
            This PR has had no activity for **60 days**. It will be automatically closed in **14 days** unless updated.

            If you're still working on this, please push a new commit or leave a comment.
          close-issue-message: |
            Closing due to 74 days of inactivity. Feel free to re-open if this is still relevant.
          close-pr-message: |
            Closing due to 74 days of inactivity. The branch is preserved — feel free to re-open.

          # ── Exemptions ───────────────────────────────────────────────────
          exempt-issue-labels: 'keep-open,pinned,security,type:bug'
          exempt-pr-labels: 'keep-open,pinned'
          # Never auto-close issues assigned to an active milestone
          exempt-all-milestones: true
