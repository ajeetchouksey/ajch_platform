<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Aarya — My AI Learning Hub</title>
    <script>
      // GitHub Pages SPA redirect: converts path to query param
      // so index.html can pick it up and restore the route
      var pathSegmentsToKeep = 0; // custom root domain — no subdirectory prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
